name: 阿里云盘链接自动检测

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install aligo

      - name: 运行链接检测
        env:
          ALIYUN_REFRESH_TOKEN: ${{ secrets.ALIYUN_REFRESH_TOKEN }}
        run: python checker.py

      - name: 自动提交变更
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自动清理失效的阿里云盘链接"
          commit_user_name: "LinkChecker Bot"
          file_pattern: "alishare_list.txt invalid_links.txt"
