name: 清理失效115分享

on:
  schedule:
    # 每天 UTC 时间 16:00 运行（北京时间 00:00）
    - cron: '0 16 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送更改
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install p115client

      - name: 运行检查脚本
        env:
          COOKIE_115: ${{ secrets.COOKIE_115 }}
        run: python .github/scripts/check_115_share.py

      - name: 提交更改（如有更新）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 115share_list.txt
          if git diff --cached --quiet; then
            echo "没有变化，跳过提交"
          else
            git commit -m "自动清理失效115分享 [skip ci]"
            git push
          fi
