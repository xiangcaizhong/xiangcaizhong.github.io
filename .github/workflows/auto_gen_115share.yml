name: 自动更新115分享列表   # 注意名称匹配

on:
  push:
    paths:
      - '115.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests   # 应该是 requests，不是 p115client

      - name: 处理115.txt并生成115share_list.txt
        env:
          COOKIE_115: ${{ secrets.COOKIE_115 }}
        run: python generate_from_115txt.py

      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 115share_list.txt
          if git diff --cached --quiet; then
            echo "没有变化，跳过提交"
          else
            git commit -m "🤖 自动更新115分享列表 [skip ci]"
            git push
          fi
