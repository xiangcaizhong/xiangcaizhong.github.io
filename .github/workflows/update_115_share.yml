name: 自动更新115分享列表

on:
  push:
    paths:
      - '115.txt'          # 只有115.txt被修改时才触发
  workflow_dispatch:       # 也支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行更新脚本
        env:
          COOKIE_115: ${{ secrets.COOKIE_115 }}
        run: python update_115_share.py
      
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 115share_list.txt
          git commit -m "自动更新115分享列表" || echo "没有变化需要提交"
          git push
